<body>
    <header class="hero">
        <div class="hero-contenido">
            <h1>BAR PISCINAS ANCÍN</h1>
            <br>
            <a href="carta.html" class="btn-ver-carta">
                <span>Ver Carta Digital</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </a>
        </div>
    </header>

    <main>
        <section id="reservas-seccion">
            <h2>RESERVA TU MESA</h2>
            <form id="formulario-reserva" class="form-grid">
                <input type="text" id="nombre" placeholder="Nombre completo" required>
                <input type="tel" id="telefono" placeholder="Teléfono" required>
                
                <input type="number" id="comensales" placeholder="Nº Personas" min="1" max="20" required>
                <input type="date" id="fecha" required>
                <input type="time" id="hora" required>
                
                <textarea id="comentarios" class="full-width" placeholder="Comentarios (Alergias, necesidades especiales...)" rows="2"></textarea>
                
                <button type="submit" id="btn-submit" class="full-width">Confirmar Reserva</button>
            </form>
        </section>
    </main>

    <footer class="footer-contacto">
        <div class="footer-grid">
            <div class="footer-col">
                <h4>Contacto Online</h4>
                <a href="mailto:chavahinigo@gmail.com" class="enlace-contacto">✉️ chavahinigo@gmail.com</a>
